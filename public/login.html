<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Wooden House</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      line-height: 1.6;
    }

    .login-container {
      background: #2d2d2d;
      padding: 50px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      max-width: 450px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 42px;
      color: #8b7355;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .logo p {
      color: #a0a0a0;
      font-size: 14px;
    }

    /* ========== ALERTS ========== */
    .alert {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      white-space: pre-line;
    }

    .alert.show { 
      display: block; 
      animation: slideIn 0.3s ease; 
    }

    @keyframes slideIn {
      from { 
        opacity: 0; 
        transform: translateY(-10px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    .alert-error {
      background: #4a2020;
      border-left: 4px solid #8b1a1a;
      color: #ffb3b3;
    }

    .alert-info {
      background: #20304a;
      border-left: 4px solid #4a7c8b;
      color: #b3d9ff;
    }

    /* ========== FORM ========== */
    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      color: #8b7355;
      margin-bottom: 10px;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 15px;
      background: #3d3d3d;
      border: 2px solid #4a4a4a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 16px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #8b7355;
      background: #4a4a4a;
    }

    .form-group input::placeholder {
      color: #666;
    }

    /* ========== PASSWORD TOGGLE ========== */
    .password-wrap {
      position: relative;
    }

    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #8b7355;
      padding: 5px;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s;
    }

    .toggle-pass:hover {
      color: #a0865f;
      transform: translateY(-50%) scale(1.1);
    }

    /* ========== REMEMBER / FORGOT ========== */
    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #a0a0a0;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .forgot-password {
      color: #8b7355;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s;
    }

    .forgot-password:hover {
      color: #a0865f;
    }

    /* ========== BUTTON ========== */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: #8b7355;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-login:hover {
      background: #a0865f;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(139, 115, 85, 0.5);
    }

    .btn-login:disabled {
      background: #4a4a4a;
      cursor: not-allowed;
      transform: none;
      opacity: 0.6;
    }

    /* ========== DIVIDER ========== */
    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      color: #666;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #3d3d3d;
    }

    .divider::before {
      margin-right: 15px;
    }

    .divider::after {
      margin-left: 15px;
    }

    /* ========== BACK LINK ========== */
    .back-to-site {
      text-align: center;
      margin-top: 30px;
    }

    .back-to-site a {
      color: #a0a0a0;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s;
    }

    .back-to-site a:hover {
      color: #8b7355;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }

      .logo h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo">
      <h1>WOODEN HOUSE</h1>
      <p>Panel Administrativo</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email" 
          name="email" 
          type="email" 
          placeholder="correo@woodenhouse.com" 
          required 
          autocomplete="username"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrap">
          <input 
            id="password" 
            name="password" 
            type="password" 
            placeholder="••••••••" 
            required 
            autocomplete="current-password"
          >
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">👁️</button>
        </div>
      </div>

      <div class="remember-forgot">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe">
          <span>Recordarme</span>
        </label>
        <a href="#" class="forgot-password" id="forgotLink">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesión</button>
    </form>

    <div class="divider">Solo para personal autorizado</div>

    <div class="back-to-site">
      <a href="index.html">← Volver al sitio web</a>
    </div>
  </div>

  <script>
    // =========================
    // CONFIGURACIÓN DE RUTAS
    // =========================
    const ROUTES = {
      admin: "admin/panel_administrador.html",
      empleado: "empleado/panel_empleado.html"
    };

    // =========================
    // VER/OCULTAR CONTRASEÑA
    // =========================
    const togglePass = document.getElementById('togglePass');
    const password = document.getElementById('password');

    togglePass.addEventListener('click', () => {
      const isPassword = password.type === 'password';
      password.type = isPassword ? 'text' : 'password';
      togglePass.textContent = isPassword ? '🙈' : '👁️';
      togglePass.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });

    // =========================
    // SISTEMA DE ALERTAS
    // =========================
    const alertBox = document.getElementById('alertBox');

    function showAlert(type, message) {
      alertBox.className = 'alert show ' + type;
      alertBox.textContent = message;
      
      // Auto-ocultar después de 5 segundos
      setTimeout(() => {
        alertBox.classList.remove('show');
      }, 5000);
    }

    // =========================
    // MANEJO DEL LOGIN
    // =========================
    const loginForm = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const rememberMe = document.getElementById('rememberMe');
    const emailInput = document.getElementById('email');

    // Cargar email guardado si existe
    const savedEmail = localStorage.getItem('remember_email');
    if (savedEmail) {
      emailInput.value = savedEmail;
      rememberMe.checked = true;
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const userEmail = emailInput.value.trim().toLowerCase();
      const userPassword = password.value.trim();

      // Guardar o eliminar email según checkbox
      if (rememberMe.checked) {
        localStorage.setItem('remember_email', userEmail);
      } else {
        localStorage.removeItem('remember_email');
      }

      // Deshabilitar botón durante validación
      btnLogin.disabled = true;
      btnLogin.textContent = '⏳ Verificando...';

      // Simular delay de red (reemplazar con llamada real a API)
      setTimeout(() => {
        // CREDENCIALES DE DEMOSTRACIÓN
        // TODO: Reemplazar con sistema de autenticación real (Firebase, API, etc.)
        const isAdmin = (userEmail === 'admin@woodenhouse.com' && userPassword === 'admin123');
        const isEmpleado = (userEmail === 'empleado@woodenhouse.com' && userPassword === 'empleado123');

        if (!isAdmin && !isEmpleado) {
          showAlert('alert-error', 
            '❌ Credenciales inválidas.\n\n' +
            'Prueba con:\n' +
            '• admin@woodenhouse.com / admin123\n' +
            '• empleado@woodenhouse.com / empleado123'
          );
          btnLogin.disabled = false;
          btnLogin.textContent = 'Iniciar Sesión';
          return;
        }

        // Determinar rol y ruta de redirección
        const role = isAdmin ? 'admin' : 'empleado';
        const redirectTo = ROUTES[role];

        // Guardar sesión en localStorage
        const session = {
          role: role,
          email: userEmail,
          loginAt: new Date().toISOString()
        };
        localStorage.setItem('wh_session', JSON.stringify(session));

        // Mostrar mensaje de éxito
        showAlert('alert-info', `✅ Acceso correcto como ${role.toUpperCase()}. Redirigiendo...`);

        // Redirigir al panel correspondiente
        setTimeout(() => {
          window.location.href = redirectTo;
        }, 800);

      }, 600);
    });

    // =========================
    // RECUPERAR CONTRASEÑA
    // =========================
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      showAlert('alert-info', 
        '🔒 Función de recuperación de contraseña.\n\n' +
        'En producción, aquí se enviaría un correo de recuperación.'
      );
    });

    // =========================
    // VALIDACIÓN EN TIEMPO REAL
    // =========================
    emailInput.addEventListener('input', () => {
      if (emailInput.value && !emailInput.validity.valid) {
        emailInput.style.borderColor = '#8b1a1a';
      } else {
        emailInput.style.borderColor = '#4a4a4a';
      }
    });
  </script>
</body>
</html>
